<?xml version="1.0" encoding="UTF-8"?>
<!--
  VFX: vfx_spark.svg
  Sprite sheet: 4 frames of yellow electrical spark
  Frame size: 64x64px | Total sheet: 256x64px
  Animation: left-to-right, frames 0-3
  Usage: slice at x=0,64,128,192 each 64px wide
  Color: Electric yellow #FFE600 / #FFF200 with white hot core
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64" width="256" height="64">
  <defs>
    <radialGradient id="spark-core0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffe600" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark-core1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fff200" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark-core2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ffe600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark-core3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe600" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#883300" stop-opacity="0"/>
    </radialGradient>
    <filter id="spark-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Frame 0: initial spark birth — small bright dot with short tendrils -->
  <g transform="translate(0,0)" filter="url(#spark-glow)">
    <circle cx="32" cy="32" r="4" fill="url(#spark-core0)"/>
    <circle cx="32" cy="32" r="2" fill="#ffffff"/>
    <!-- Jagged lightning tendrils -->
    <polyline points="32,32 32,22 34,26 36,18" fill="none" stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="32,32 42,30 38,27 46,24" fill="none" stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="32,32 28,40 30,38 26,44" fill="none" stroke="#ffaa00" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Frame 1: full discharge — multiple branching arcs -->
  <g transform="translate(64,0)" filter="url(#spark-glow)">
    <circle cx="32" cy="32" r="8" fill="url(#spark-core1)"/>
    <circle cx="32" cy="32" r="3" fill="#ffffff"/>
    <!-- Main bolt up -->
    <polyline points="32,32 31,24 34,20 30,12 33,8" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right branch -->
    <polyline points="32,32 40,29 44,32 50,28 56,30" fill="none" stroke="#ffe600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left branch -->
    <polyline points="32,32 24,34 20,30 14,32 8,28" fill="none" stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Down branch -->
    <polyline points="32,32 33,40 30,44 34,50 31,56" fill="none" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Diagonal spark -->
    <polyline points="32,32 38,26 42,22 40,16" fill="none" stroke="#fff200" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Micro sparks (dots) -->
    <circle cx="10" cy="18" r="1.5" fill="#ffe600" opacity="0.8"/>
    <circle cx="54" cy="12" r="1"   fill="#ffffff"  opacity="0.9"/>
    <circle cx="6"  cy="44" r="1.5" fill="#ffaa00"  opacity="0.7"/>
    <circle cx="58" cy="52" r="1"   fill="#ffe600"  opacity="0.8"/>
  </g>

  <!-- Frame 2: fading discharge — dimmer, fewer branches -->
  <g transform="translate(128,0)" filter="url(#spark-glow)">
    <circle cx="32" cy="32" r="6" fill="url(#spark-core2)"/>
    <circle cx="32" cy="32" r="2" fill="#ffffff" opacity="0.8"/>
    <!-- Remaining arcs, thinner -->
    <polyline points="32,32 31,22 35,17 29,10" fill="none" stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <polyline points="32,32 42,30 48,33 55,29" fill="none" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <polyline points="32,32 24,35 18,31 11,34" fill="none" stroke="#ffcc00" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Floating sparks -->
    <circle cx="14" cy="14" r="2" fill="#ffe600" opacity="0.6"/>
    <circle cx="52" cy="18" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="8"  cy="50" r="1.5" fill="#ffaa00" opacity="0.5"/>
  </g>

  <!-- Frame 3: dissipated — last embers -->
  <g transform="translate(192,0)" filter="url(#spark-glow)">
    <circle cx="32" cy="32" r="3" fill="url(#spark-core3)"/>
    <!-- Tiny residual sparks floating away -->
    <circle cx="32" cy="20" r="2"  fill="#ffe600" opacity="0.4"/>
    <circle cx="44" cy="28" r="1.5" fill="#ffcc00" opacity="0.35"/>
    <circle cx="20" cy="36" r="1.5" fill="#ffcc00" opacity="0.3"/>
    <circle cx="38" cy="44" r="1"  fill="#ff9900" opacity="0.25"/>
    <circle cx="24" cy="16" r="1"  fill="#ffe600" opacity="0.3"/>
    <circle cx="48" cy="46" r="1"  fill="#ff9900" opacity="0.2"/>
  </g>
</svg>
