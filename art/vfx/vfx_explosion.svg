<?xml version="1.0" encoding="UTF-8"?>
<!--
  VFX: vfx_explosion.svg
  Sprite sheet: 6 frames of neon-pink burst explosion
  Frame size: 128x128px | Total sheet: 768x128px
  Animation: left-to-right, frames 0-5
  Usage: slice at x=0,128,256,384,512,640 each 128px wide
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 128" width="768" height="128">
  <defs>
    <radialGradient id="burst0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ff2aff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff2aff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burst1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ff2aff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff00aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burst2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0ff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ff2aff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cc00ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burst3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2aff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#cc00ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#330033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burst4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc00ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#660066" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#110011" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burst5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#440044" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Frame 0: ignition — tiny bright core -->
  <g transform="translate(0,0)" filter="url(#glow)">
    <circle cx="64" cy="64" r="8" fill="url(#burst0)"/>
    <circle cx="64" cy="64" r="4" fill="#ffffff"/>
    <!-- spark rays -->
    <line x1="64" y1="64" x2="64" y2="50" stroke="#ff2aff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="74" y2="54" stroke="#ff2aff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="54" y2="54" stroke="#ff2aff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 1: expanding burst -->
  <g transform="translate(128,0)" filter="url(#glow)">
    <circle cx="64" cy="64" r="28" fill="url(#burst1)"/>
    <circle cx="64" cy="64" r="10" fill="#ffffff"/>
    <line x1="64" y1="64" x2="64" y2="36" stroke="#ff88ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="88" y2="40" stroke="#ff88ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="40" y2="40" stroke="#ff88ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="92" y2="64" stroke="#ff88ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="36" y2="64" stroke="#ff88ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="64" y2="92" stroke="#ff88ff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 2: full bloom -->
  <g transform="translate(256,0)" filter="url(#glow)">
    <circle cx="64" cy="64" r="56" fill="url(#burst2)"/>
    <circle cx="64" cy="64" r="18" fill="#ffffff" opacity="0.9"/>
    <!-- 8 main rays -->
    <line x1="64" y1="64" x2="64" y2="8"  stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="104" y2="24" stroke="#ff2aff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="120" y2="64" stroke="#ff2aff" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="104" y2="104" stroke="#ff2aff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="64" y2="120" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="24" y2="104" stroke="#ff2aff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="8"  y2="64"  stroke="#ff2aff" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="24" y2="24"  stroke="#ff2aff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- debris shards -->
    <polygon points="64,10 68,20 60,20" fill="#ff2aff" opacity="0.8"/>
    <polygon points="118,64 108,60 108,68" fill="#ff2aff" opacity="0.8"/>
    <polygon points="64,118 68,108 60,108" fill="#ff2aff" opacity="0.8"/>
    <polygon points="10,64 20,60 20,68" fill="#ff2aff" opacity="0.8"/>
  </g>

  <!-- Frame 3: dissipating ring -->
  <g transform="translate(384,0)" filter="url(#glow)">
    <circle cx="64" cy="64" r="60" fill="none" stroke="#ff2aff" stroke-width="4" opacity="0.6"/>
    <circle cx="64" cy="64" r="44" fill="url(#burst3)"/>
    <circle cx="64" cy="64" r="12" fill="#ff88ff" opacity="0.7"/>
    <!-- fading shards -->
    <polygon points="64,4  70,18  58,18"  fill="#ff2aff" opacity="0.6"/>
    <polygon points="124,64 110,58 110,70" fill="#ff2aff" opacity="0.5"/>
    <polygon points="64,124 70,110 58,110" fill="#ff2aff" opacity="0.6"/>
    <polygon points="4,64  18,58  18,70"  fill="#ff2aff" opacity="0.5"/>
    <polygon points="106,22 98,34 110,36" fill="#cc00ff" opacity="0.5"/>
    <polygon points="22,106 34,98 36,110" fill="#cc00ff" opacity="0.5"/>
    <polygon points="106,106 98,94 110,94" fill="#cc00ff" opacity="0.5"/>
    <polygon points="22,22  34,30 36,18"  fill="#cc00ff" opacity="0.5"/>
  </g>

  <!-- Frame 4: afterglow fade -->
  <g transform="translate(512,0)" filter="url(#glow)">
    <circle cx="64" cy="64" r="62" fill="none" stroke="#cc00ff" stroke-width="2" opacity="0.3"/>
    <circle cx="64" cy="64" r="36" fill="url(#burst4)"/>
    <circle cx="64" cy="64" r="8" fill="#cc00ff" opacity="0.4"/>
    <!-- distant sparks -->
    <circle cx="64" cy="6"  r="3" fill="#ff2aff" opacity="0.4"/>
    <circle cx="122" cy="64" r="3" fill="#ff2aff" opacity="0.3"/>
    <circle cx="64" cy="122" r="3" fill="#ff2aff" opacity="0.4"/>
    <circle cx="6"  cy="64" r="3" fill="#ff2aff" opacity="0.3"/>
  </g>

  <!-- Frame 5: dissipated — wisp -->
  <g transform="translate(640,0)" filter="url(#glow)">
    <circle cx="64" cy="64" r="20" fill="url(#burst5)"/>
    <circle cx="64" cy="64" r="4" fill="#440044" opacity="0.15"/>
    <!-- ghost ring -->
    <circle cx="64" cy="64" r="58" fill="none" stroke="#330033" stroke-width="1" opacity="0.15"/>
  </g>
</svg>
