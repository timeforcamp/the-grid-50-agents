<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 540" width="1920" height="540">
  <!--
    PARALLAX LAYER 2 — FAR SKYLINE
    Transparent background. Distant skyscraper silhouettes with neon roof-glows.
    Designed to tile horizontally (left/right edges are mid-building cuts).
  -->
  <defs>
    <!-- Neon glow at building tops — radial gradients by color -->
    <radialGradient id="glowCyan" cx="50%" cy="100%" r="100%">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#00ccff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="50%" cy="100%" r="100%">
      <stop offset="0%"   stop-color="#ff00cc" stop-opacity="0.70"/>
      <stop offset="55%"  stop-color="#cc0099" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#440033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="100%" r="100%">
      <stop offset="0%"   stop-color="#ff8800" stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#ff4400" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#441100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="100%" r="100%">
      <stop offset="0%"   stop-color="#00ff88" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#00cc44" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#003311" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowYellow" cx="50%" cy="100%" r="100%">
      <stop offset="0%"   stop-color="#ffee00" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#cc9900" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#333300" stop-opacity="0"/>
    </radialGradient>

    <!-- Silhouette fill: very dark purple-navy -->
    <linearGradient id="bldgFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06000f"/>
      <stop offset="100%" stop-color="#0a0018"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="tinyBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!--
    BUILDINGS — each rect: (x, y=top, width, height to reach y=540)
    Alternating neon-glow colors for variety.
    Buildings tile: leftmost and rightmost are cut mid-building.
  -->

  <!-- ── BUILDING SILHOUETTES ── -->
  <!-- Left-edge partial buildings (continue from right when tiled) -->
  <rect x="0"    y="318" width="58"  height="222" fill="url(#bldgFill)"/>
  <rect x="52"   y="278" width="82"  height="262" fill="url(#bldgFill)"/>
  <!-- Spire on tall one -->
  <rect x="84"   y="245" width="6"   height="35"  fill="url(#bldgFill)"/>

  <rect x="128"  y="308" width="48"  height="232" fill="url(#bldgFill)"/>
  <rect x="170"  y="242" width="105" height="298" fill="url(#bldgFill)"/>
  <!-- Antenna -->
  <rect x="212"  y="208" width="5"   height="36"  fill="url(#bldgFill)"/>
  <rect x="270"  y="312" width="55"  height="228" fill="url(#bldgFill)"/>

  <rect x="318"  y="288" width="52"  height="252" fill="url(#bldgFill)"/>
  <rect x="364"  y="248" width="122" height="292" fill="url(#bldgFill)"/>
  <!-- Antenna cluster on wide building -->
  <rect x="376"  y="218" width="4"   height="32"  fill="url(#bldgFill)"/>
  <rect x="383"  y="224" width="3"   height="26"  fill="url(#bldgFill)"/>
  <rect x="455"  y="220" width="5"   height="30"  fill="url(#bldgFill)"/>

  <rect x="480"  y="272" width="68"  height="268" fill="url(#bldgFill)"/>
  <rect x="542"  y="322" width="42"  height="218" fill="url(#bldgFill)"/>
  <rect x="578"  y="232" width="95"  height="308" fill="url(#bldgFill)"/>
  <!-- Tall spire -->
  <rect x="614"  y="195" width="7"   height="39"  fill="url(#bldgFill)"/>

  <rect x="668"  y="295" width="58"  height="245" fill="url(#bldgFill)"/>
  <rect x="720"  y="262" width="80"  height="278" fill="url(#bldgFill)"/>
  <rect x="793"  y="302" width="52"  height="238" fill="url(#bldgFill)"/>
  <rect x="838"  y="248" width="112" height="292" fill="url(#bldgFill)"/>
  <rect x="882"  y="215" width="8"   height="35"  fill="url(#bldgFill)"/>

  <rect x="944"  y="288" width="62"  height="252" fill="url(#bldgFill)"/>
  <rect x="1000" y="316" width="42"  height="224" fill="url(#bldgFill)"/>
  <rect x="1036" y="255" width="88"  height="285" fill="url(#bldgFill)"/>
  <rect x="1070" y="225" width="5"   height="32"  fill="url(#bldgFill)"/>

  <rect x="1118" y="292" width="55"  height="248" fill="url(#bldgFill)"/>
  <rect x="1167" y="272" width="72"  height="268" fill="url(#bldgFill)"/>
  <rect x="1232" y="236" width="108" height="304" fill="url(#bldgFill)"/>
  <rect x="1272" y="205" width="6"   height="33"  fill="url(#bldgFill)"/>
  <rect x="1280" y="210" width="4"   height="28"  fill="url(#bldgFill)"/>

  <rect x="1334" y="305" width="50"  height="235" fill="url(#bldgFill)"/>
  <rect x="1378" y="268" width="80"  height="272" fill="url(#bldgFill)"/>
  <rect x="1450" y="285" width="62"  height="255" fill="url(#bldgFill)"/>
  <rect x="1505" y="312" width="44"  height="228" fill="url(#bldgFill)"/>
  <rect x="1542" y="242" width="112" height="298" fill="url(#bldgFill)"/>
  <rect x="1588" y="210" width="5"   height="34"  fill="url(#bldgFill)"/>

  <rect x="1648" y="272" width="70"  height="268" fill="url(#bldgFill)"/>
  <rect x="1712" y="295" width="52"  height="245" fill="url(#bldgFill)"/>
  <rect x="1757" y="255" width="90"  height="285" fill="url(#bldgFill)"/>
  <rect x="1792" y="222" width="6"   height="35"  fill="url(#bldgFill)"/>
  <!-- Right-edge partial buildings -->
  <rect x="1840" y="278" width="80"  height="262" fill="url(#bldgFill)"/>
  <rect x="1892" y="318" width="28"  height="222" fill="url(#bldgFill)"/>

  <!-- ── NEON ROOF GLOWS ── (radial gradients above rooflines) -->
  <!-- Using ellipses centered at roof-edge, oriented upward -->
  <!-- Cyan glows -->
  <ellipse cx="222" cy="242" rx="55" ry="38" fill="url(#glowCyan)"    filter="url(#softBlur)" opacity="0.9"/>
  <ellipse cx="617" cy="195" rx="40" ry="28" fill="url(#glowCyan)"    filter="url(#softBlur)" opacity="0.85"/>
  <ellipse cx="1074" cy="225" rx="48" ry="32" fill="url(#glowCyan)"  filter="url(#softBlur)" opacity="0.88"/>
  <ellipse cx="1795" cy="222" rx="52" ry="36" fill="url(#glowCyan)"  filter="url(#softBlur)" opacity="0.82"/>

  <!-- Magenta glows -->
  <ellipse cx="390" cy="248" rx="65" ry="42" fill="url(#glowMagenta)" filter="url(#softBlur)" opacity="0.90"/>
  <ellipse cx="760" cy="262" rx="42" ry="30" fill="url(#glowMagenta)" filter="url(#softBlur)" opacity="0.82"/>
  <ellipse cx="1290" cy="236" rx="58" ry="38" fill="url(#glowMagenta)" filter="url(#softBlur)" opacity="0.88"/>
  <ellipse cx="1600" cy="242" rx="60" ry="40" fill="url(#glowMagenta)" filter="url(#softBlur)" opacity="0.85"/>

  <!-- Orange glows -->
  <ellipse cx="88"  cy="245" rx="45" ry="32" fill="url(#glowOrange)"  filter="url(#softBlur)" opacity="0.80"/>
  <ellipse cx="625" cy="232" rx="50" ry="34" fill="url(#glowOrange)"  filter="url(#softBlur)" opacity="0.82"/>
  <ellipse cx="950" cy="288" rx="35" ry="25" fill="url(#glowOrange)"  filter="url(#softBlur)" opacity="0.78"/>
  <ellipse cx="1440" cy="268" rx="44" ry="30" fill="url(#glowOrange)" filter="url(#softBlur)" opacity="0.80"/>

  <!-- Green glows -->
  <ellipse cx="540" cy="232" rx="50" ry="35" fill="url(#glowGreen)"   filter="url(#softBlur)" opacity="0.78"/>
  <ellipse cx="893" cy="248" rx="58" ry="38" fill="url(#glowGreen)"   filter="url(#softBlur)" opacity="0.82"/>
  <ellipse cx="1186" cy="272" rx="38" ry="26" fill="url(#glowGreen)"  filter="url(#softBlur)" opacity="0.76"/>
  <ellipse cx="1760" cy="255" rx="48" ry="32" fill="url(#glowGreen)"  filter="url(#softBlur)" opacity="0.80"/>

  <!-- Yellow/amber glows -->
  <ellipse cx="175" cy="242" rx="55" ry="36" fill="url(#glowYellow)"  filter="url(#softBlur)" opacity="0.75"/>
  <ellipse cx="1040" cy="255" rx="46" ry="30" fill="url(#glowYellow)" filter="url(#softBlur)" opacity="0.78"/>
  <ellipse cx="1395" cy="268" rx="42" ry="28" fill="url(#glowYellow)" filter="url(#softBlur)" opacity="0.74"/>

  <!-- Small blinking antenna lights (tiny bright dots at tip) -->
  <circle cx="87"  cy="245" r="2.5" fill="#ff4400" opacity="0.95" filter="url(#tinyBlur)"/>
  <circle cx="617" cy="194" r="2"   fill="#00ffff" opacity="0.95" filter="url(#tinyBlur)"/>
  <circle cx="884" cy="215" r="2"   fill="#ff00cc" opacity="0.95" filter="url(#tinyBlur)"/>
  <circle cx="1073" cy="225" r="2"  fill="#00ffff" opacity="0.90" filter="url(#tinyBlur)"/>
  <circle cx="1275" cy="205" r="2.5" fill="#ff8800" opacity="0.92" filter="url(#tinyBlur)"/>
  <circle cx="1591" cy="210" r="2"  fill="#ff00cc" opacity="0.95" filter="url(#tinyBlur)"/>
  <circle cx="1794" cy="222" r="2"  fill="#00ffcc" opacity="0.90" filter="url(#tinyBlur)"/>
</svg>
