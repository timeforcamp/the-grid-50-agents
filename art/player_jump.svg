<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-mag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- HEAD (tilted forward, mid-air) -->
  <rect x="10" y="1"  width="12" height="2"  fill="#8899aa"/>
  <rect x="8"  y="3"  width="16" height="2"  fill="#99aabb"/>
  <rect x="8"  y="5"  width="2"  height="6"  fill="#99aabb"/>
  <rect x="22" y="5"  width="2"  height="6"  fill="#99aabb"/>
  <rect x="8"  y="11" width="2"  height="2"  fill="#8899aa"/>
  <rect x="22" y="11" width="2"  height="2"  fill="#8899aa"/>
  <rect x="10" y="11" width="12" height="2"  fill="#8899aa"/>
  <!-- visor -->
  <rect x="10" y="5"  width="12" height="6"  fill="#001a2e"/>
  <rect x="10" y="5"  width="12" height="1"  fill="#00ffff" filter="url(#glow-cyan)"/>
  <rect x="10" y="10" width="12" height="1"  fill="#00ffff" filter="url(#glow-cyan)"/>
  <rect x="10" y="6"  width="12" height="1"  fill="#00eeff" opacity="0.7"/>
  <rect x="10" y="8"  width="12" height="2"  fill="#003344" opacity="0.4"/>
  <!-- visor bright scanline -->
  <rect x="12" y="7"  width="8"  height="1"  fill="#00ffff" opacity="0.5"/>

  <!-- NECK -->
  <rect x="12" y="13" width="8"  height="2"  fill="#556677"/>
  <rect x="12" y="13" width="8"  height="1"  fill="#ff00cc" opacity="0.7" filter="url(#glow-mag)"/>

  <!-- TORSO (upright, slight lean) -->
  <rect x="10" y="15" width="14" height="10" fill="#1a2b3c"/>
  <rect x="10" y="16" width="14" height="1"  fill="#00ffff" opacity="0.9" filter="url(#glow-cyan)"/>
  <!-- chest plate -->
  <rect x="12" y="18" width="4"  height="4"  fill="#2a3f55"/>
  <rect x="18" y="18" width="4"  height="4"  fill="#2a3f55"/>
  <rect x="16" y="17" width="2"  height="6"  fill="#334455"/>
  <!-- shoulders -->
  <rect x="8"  y="15" width="2"  height="4"  fill="#334455"/>
  <rect x="8"  y="15" width="2"  height="1"  fill="#ff00cc" filter="url(#glow-mag)"/>
  <rect x="24" y="15" width="2"  height="4"  fill="#334455"/>
  <rect x="24" y="15" width="2"  height="1"  fill="#ff00cc" filter="url(#glow-mag)"/>

  <!-- ARMS (spread out for balance — both out wide) -->
  <!-- Left arm (out-left, slightly up) -->
  <rect x="4"  y="15" width="4"  height="2"  fill="#334455"/>
  <rect x="2"  y="17" width="4"  height="2"  fill="#445566"/>
  <!-- Left hand -->
  <rect x="2"  y="19" width="4"  height="2"  fill="#7788aa"/>

  <!-- Right arm (out-right) -->
  <rect x="26" y="15" width="4"  height="2"  fill="#334455"/>
  <rect x="28" y="17" width="4"  height="2"  fill="#445566"/>
  <!-- Right hand -->
  <rect x="28" y="19" width="4"  height="2"  fill="#7788aa"/>

  <!-- WAIST -->
  <rect x="10" y="25" width="14" height="2"  fill="#112233"/>
  <rect x="10" y="25" width="14" height="1"  fill="#ff00cc" opacity="0.8" filter="url(#glow-mag)"/>
  <rect x="14" y="25" width="4"  height="2"  fill="#00ffff" opacity="0.7" filter="url(#glow-cyan)"/>

  <!-- LEGS (tucked up, knees raised for jump) -->
  <!-- Left leg (tucked) -->
  <rect x="10" y="27" width="6"  height="4"  fill="#1a2b3c"/>
  <rect x="8"  y="31" width="6"  height="4"  fill="#223344"/>
  <!-- Left boot -->
  <rect x="8"  y="35" width="8"  height="4"  fill="#112233"/>
  <rect x="8"  y="35" width="8"  height="1"  fill="#00ffff" opacity="0.6" filter="url(#glow-cyan)"/>
  <rect x="6"  y="37" width="10" height="2"  fill="#0a1a28"/>
  <rect x="6"  y="39" width="4"  height="2"  fill="#00ffff" opacity="0.4" filter="url(#glow-cyan)"/>

  <!-- Right leg (tucked, slightly offset) -->
  <rect x="18" y="27" width="6"  height="4"  fill="#1a2b3c"/>
  <rect x="20" y="31" width="6"  height="4"  fill="#223344"/>
  <!-- Right boot -->
  <rect x="20" y="35" width="8"  height="4"  fill="#112233"/>
  <rect x="20" y="35" width="8"  height="1"  fill="#ff00cc" opacity="0.6" filter="url(#glow-mag)"/>
  <rect x="20" y="37" width="10" height="2"  fill="#0a1a28"/>

  <!-- JUMP ENERGY TRAIL (below feet) -->
  <rect x="10" y="41" width="14" height="2"  fill="#00ffff" opacity="0.4" filter="url(#glow-cyan)"/>
  <rect x="12" y="43" width="10" height="2"  fill="#00ffff" opacity="0.25" filter="url(#glow-cyan)"/>
  <rect x="14" y="45" width="6"  height="2"  fill="#00ffff" opacity="0.1"/>

  <!-- Battle scuffs -->
  <rect x="14" y="17" width="1"  height="2"  fill="#ffffff" opacity="0.12"/>
  <rect x="21" y="20" width="1"  height="2"  fill="#ffffff" opacity="0.1"/>
</svg>
