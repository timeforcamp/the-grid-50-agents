<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!--
    Hack pose: arm extended right, green data-stream particles shooting out.
    48x48 to accommodate the data stream.
  -->
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-mag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- HEAD -->
  <rect x="8"  y="2"  width="12" height="2"  fill="#8899aa"/>
  <rect x="6"  y="4"  width="16" height="2"  fill="#99aabb"/>
  <rect x="6"  y="6"  width="2"  height="6"  fill="#99aabb"/>
  <rect x="20" y="6"  width="2"  height="6"  fill="#99aabb"/>
  <rect x="6"  y="12" width="2"  height="2"  fill="#8899aa"/>
  <rect x="20" y="12" width="2"  height="2"  fill="#8899aa"/>
  <rect x="8"  y="12" width="12" height="2"  fill="#8899aa"/>
  <!-- visor — green tint for hack mode -->
  <rect x="8"  y="6"  width="12" height="6"  fill="#001a10"/>
  <rect x="8"  y="6"  width="12" height="1"  fill="#00ff66" filter="url(#glow-green)"/>
  <rect x="8"  y="11" width="12" height="1"  fill="#00ff66" filter="url(#glow-green)"/>
  <rect x="8"  y="7"  width="12" height="1"  fill="#00ee55" opacity="0.8"/>
  <rect x="8"  y="9"  width="12" height="2"  fill="#002210" opacity="0.5"/>
  <!-- hack mode visor glow overlay -->
  <rect x="8"  y="6"  width="12" height="6"  fill="#00ff44" opacity="0.15" filter="url(#glow-green)"/>
  <!-- matrix-style scanlines on visor -->
  <rect x="10" y="7"  width="2"  height="1"  fill="#00ff66" opacity="0.9"/>
  <rect x="14" y="8"  width="2"  height="1"  fill="#00ff66" opacity="0.7"/>
  <rect x="12" y="9"  width="2"  height="1"  fill="#00ff66" opacity="0.6"/>
  <rect x="16" y="7"  width="2"  height="1"  fill="#00ff66" opacity="0.8"/>

  <!-- NECK -->
  <rect x="10" y="14" width="8"  height="2"  fill="#556677"/>
  <rect x="10" y="14" width="8"  height="1"  fill="#00ff66" opacity="0.7" filter="url(#glow-green)"/>

  <!-- TORSO (planted stance) -->
  <rect x="8"  y="16" width="14" height="10" fill="#1a2b3c"/>
  <rect x="8"  y="17" width="14" height="1"  fill="#00ff66" opacity="0.9" filter="url(#glow-green)"/>
  <rect x="10" y="19" width="4"  height="4"  fill="#2a3f55"/>
  <rect x="16" y="19" width="4"  height="4"  fill="#2a3f55"/>
  <rect x="14" y="18" width="2"  height="6"  fill="#334455"/>
  <!-- shoulders -->
  <rect x="6"  y="16" width="2"  height="4"  fill="#334455"/>
  <rect x="6"  y="16" width="2"  height="1"  fill="#ff00cc" filter="url(#glow-mag)"/>
  <rect x="22" y="16" width="2"  height="4"  fill="#334455"/>
  <rect x="22" y="16" width="2"  height="1"  fill="#ff00cc" filter="url(#glow-mag)"/>

  <!-- LEFT ARM (back, slightly bent) -->
  <rect x="4"  y="18" width="2"  height="2"  fill="#334455"/>
  <rect x="2"  y="20" width="2"  height="4"  fill="#445566"/>
  <rect x="2"  y="24" width="4"  height="2"  fill="#7788aa"/>

  <!-- RIGHT ARM (EXTENDED FORWARD for hack) -->
  <rect x="24" y="17" width="4"  height="2"  fill="#334455"/>
  <rect x="28" y="18" width="4"  height="2"  fill="#334455"/>
  <rect x="32" y="18" width="4"  height="2"  fill="#445566"/>
  <!-- hack gauntlet glow -->
  <rect x="34" y="16" width="6"  height="6"  fill="#223344"/>
  <rect x="34" y="16" width="6"  height="6"  fill="#00ff66" opacity="0.3" filter="url(#glow-green)"/>
  <rect x="34" y="17" width="6"  height="1"  fill="#00ff66" opacity="0.9" filter="url(#glow-green)"/>
  <rect x="34" y="20" width="6"  height="1"  fill="#00ff66" opacity="0.9" filter="url(#glow-green)"/>
  <rect x="36" y="18" width="2"  height="2"  fill="#00ff44" filter="url(#glow-green)"/>
  <!-- palm emitter -->
  <rect x="36" y="21" width="4"  height="2"  fill="#00ff66" filter="url(#glow-green)"/>

  <!-- WAIST -->
  <rect x="8"  y="26" width="14" height="2"  fill="#112233"/>
  <rect x="8"  y="26" width="14" height="1"  fill="#ff00cc" opacity="0.8" filter="url(#glow-mag)"/>
  <rect x="12" y="26" width="4"  height="2"  fill="#00ff66" opacity="0.7" filter="url(#glow-green)"/>

  <!-- LEGS (planted wide stance) -->
  <!-- Left leg -->
  <rect x="8"  y="28" width="6"  height="4"  fill="#1a2b3c"/>
  <rect x="6"  y="32" width="6"  height="4"  fill="#223344"/>
  <rect x="4"  y="36" width="8"  height="4"  fill="#112233"/>
  <rect x="4"  y="36" width="8"  height="1"  fill="#00ffff" opacity="0.6" filter="url(#glow-cyan)"/>
  <rect x="2"  y="38" width="10" height="2"  fill="#0a1a28"/>
  <rect x="2"  y="40" width="4"  height="2"  fill="#00ffff" opacity="0.4" filter="url(#glow-cyan)"/>

  <!-- Right leg -->
  <rect x="14" y="28" width="6"  height="4"  fill="#1a2b3c"/>
  <rect x="16" y="32" width="6"  height="4"  fill="#223344"/>
  <rect x="16" y="36" width="8"  height="4"  fill="#112233"/>
  <rect x="16" y="36" width="8"  height="1"  fill="#ff00cc" opacity="0.6" filter="url(#glow-mag)"/>
  <rect x="16" y="38" width="10" height="2"  fill="#0a1a28"/>

  <!-- DATA STREAM (green, shooting right from hand) -->
  <!-- main beam -->
  <rect x="40" y="20" width="6"  height="2"  fill="#00ff66" filter="url(#glow-green)"/>
  <!-- particle bursts -->
  <rect x="42" y="16" width="2"  height="2"  fill="#00ff44" opacity="0.9" filter="url(#glow-green)"/>
  <rect x="44" y="18" width="2"  height="2"  fill="#00ff66" opacity="0.8" filter="url(#glow-green)"/>
  <rect x="44" y="22" width="4"  height="2"  fill="#00ff44" opacity="0.7" filter="url(#glow-green)"/>
  <rect x="42" y="24" width="2"  height="2"  fill="#00ff22" opacity="0.6" filter="url(#glow-green)"/>
  <!-- data bits / hex fragments -->
  <rect x="44" y="14" width="2"  height="2"  fill="#00ff66" opacity="0.5"/>
  <rect x="46" y="16" width="2"  height="2"  fill="#00ee55" opacity="0.6"/>
  <rect x="46" y="20" width="2"  height="2"  fill="#00ff66" opacity="0.9" filter="url(#glow-green)"/>
  <rect x="44" y="26" width="2"  height="2"  fill="#00ff22" opacity="0.5"/>
  <rect x="46" y="12" width="2"  height="2"  fill="#00cc44" opacity="0.3"/>
  <rect x="46" y="28" width="2"  height="2"  fill="#00cc44" opacity="0.3"/>

  <!-- HACK ENERGY GROUND PULSE -->
  <rect x="4"  y="40" width="20" height="2"  fill="#00ff66" opacity="0.2" filter="url(#glow-green)"/>

  <!-- Scratches -->
  <rect x="11" y="17" width="1"  height="3"  fill="#ffffff" opacity="0.12"/>
  <rect x="18" y="20" width="1"  height="2"  fill="#ffffff" opacity="0.1"/>
</svg>
