<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 540" width="1920" height="540">
  <defs>
    <!-- Deep purple-to-magenta sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#03000a"/>
      <stop offset="20%"  stop-color="#0e0020"/>
      <stop offset="48%"  stop-color="#330055"/>
      <stop offset="72%"  stop-color="#7a0068"/>
      <stop offset="88%"  stop-color="#b5105a"/>
      <stop offset="100%" stop-color="#d0204a"/>
    </linearGradient>

    <!-- Moon halo glow -->
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="18%"  stop-color="#ffdcff" stop-opacity="0.95"/>
      <stop offset="42%"  stop-color="#cc66ff" stop-opacity="0.45"/>
      <stop offset="68%"  stop-color="#8800cc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#440088" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft horizon glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff2288" stop-opacity="0.35"/>
      <stop offset="45%"  stop-color="#aa00ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#220033" stop-opacity="0"/>
    </radialGradient>

    <!-- Scan-line tile pattern -->
    <pattern id="scanlines" x="0" y="0" width="1920" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1920" height="1" fill="#dd88ff" opacity="0.55"/>
    </pattern>

    <!-- Atmospheric smog cloud (blur) -->
    <filter id="blur8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur16" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="blur3" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- ── SKY BASE ── -->
  <rect width="1920" height="540" fill="url(#skyGrad)"/>

  <!-- Horizon warm bloom -->
  <rect width="1920" height="540" fill="url(#horizonGlow)"/>

  <!-- Distant city light spill on horizon -->
  <ellipse cx="960" cy="540" rx="1400" ry="200" fill="#ff1166" opacity="0.10" filter="url(#blur16)"/>
  <ellipse cx="400" cy="520" rx="600" ry="120" fill="#8800ff" opacity="0.09" filter="url(#blur16)"/>
  <ellipse cx="1550" cy="530" rx="550" ry="100" fill="#ff0099" opacity="0.10" filter="url(#blur16)"/>

  <!-- ── MOON ── -->
  <!-- Outer halo (large, very soft) -->
  <ellipse cx="1528" cy="102" rx="110" ry="110" fill="url(#moonHalo)" filter="url(#blur8)"/>
  <!-- Inner glow ring -->
  <circle cx="1528" cy="102" r="52" fill="#e8aaff" opacity="0.22" filter="url(#blur8)"/>
  <!-- Moon disc -->
  <circle cx="1528" cy="102" r="34" fill="#fff4ff"/>
  <!-- Moon surface detail -->
  <circle cx="1519" cy="95"  r="7"  fill="#cca8e8" opacity="0.35"/>
  <circle cx="1534" cy="108" r="5"  fill="#ccaadd" opacity="0.28"/>
  <circle cx="1514" cy="109" r="3.5" fill="#ccaadd" opacity="0.22"/>
  <circle cx="1540" cy="92"  r="4"  fill="#ddb8f0" opacity="0.2"/>
  <!-- Moon terminator shadow (crescent suggestion) -->
  <circle cx="1543" cy="102" r="34" fill="#1a0030" opacity="0.15"/>

  <!-- ── STARS ── -->
  <g fill="#ffffff">
    <!-- tiny dim stars -->
    <circle cx="42"   cy="28"  r="0.9" opacity="0.55"/>
    <circle cx="115"  cy="16"  r="0.7" opacity="0.45"/>
    <circle cx="188"  cy="50"  r="1.0" opacity="0.60"/>
    <circle cx="267"  cy="10"  r="0.6" opacity="0.40"/>
    <circle cx="388"  cy="38"  r="0.8" opacity="0.50"/>
    <circle cx="462"  cy="22"  r="1.1" opacity="0.65"/>
    <circle cx="555"  cy="58"  r="0.7" opacity="0.45"/>
    <circle cx="634"  cy="14"  r="0.9" opacity="0.55"/>
    <circle cx="710"  cy="44"  r="0.8" opacity="0.50"/>
    <circle cx="800"  cy="20"  r="1.0" opacity="0.60"/>
    <circle cx="872"  cy="64"  r="0.7" opacity="0.45"/>
    <circle cx="950"  cy="30"  r="0.9" opacity="0.55"/>
    <circle cx="1030" cy="8"   r="0.6" opacity="0.40"/>
    <circle cx="1104" cy="48"  r="1.0" opacity="0.60"/>
    <circle cx="1190" cy="22"  r="0.8" opacity="0.50"/>
    <circle cx="1270" cy="56"  r="0.7" opacity="0.45"/>
    <circle cx="1340" cy="12"  r="0.9" opacity="0.55"/>
    <circle cx="1440" cy="38"  r="1.1" opacity="0.65"/>
    <circle cx="1600" cy="18"  r="0.8" opacity="0.50"/>
    <circle cx="1680" cy="52"  r="0.7" opacity="0.45"/>
    <circle cx="1760" cy="24"  r="0.9" opacity="0.55"/>
    <circle cx="1850" cy="42"  r="0.8" opacity="0.50"/>
    <!-- slightly brighter stars -->
    <circle cx="160"  cy="78"  r="1.4" opacity="0.80"/>
    <circle cx="340"  cy="95"  r="1.2" opacity="0.75"/>
    <circle cx="530"  cy="72"  r="1.5" opacity="0.85"/>
    <circle cx="740"  cy="86"  r="1.3" opacity="0.78"/>
    <circle cx="985"  cy="68"  r="1.4" opacity="0.80"/>
    <circle cx="1160" cy="90"  r="1.2" opacity="0.75"/>
    <circle cx="1390" cy="76"  r="1.5" opacity="0.82"/>
    <circle cx="1720" cy="88"  r="1.3" opacity="0.78"/>
    <!-- twinkling points (highest brightness) -->
    <circle cx="78"   cy="142" r="1.6" opacity="0.90"/>
    <circle cx="495"  cy="128" r="1.7" opacity="0.92"/>
    <circle cx="880"  cy="118" r="1.5" opacity="0.88"/>
    <circle cx="1250" cy="135" r="1.6" opacity="0.90"/>
    <circle cx="1810" cy="112" r="1.7" opacity="0.92"/>
  </g>

  <!-- ── ATMOSPHERIC SMOG CLOUDS ── -->
  <ellipse cx="240"  cy="340" rx="420" ry="55" fill="#5500aa" opacity="0.18" filter="url(#blur8)"/>
  <ellipse cx="820"  cy="390" rx="500" ry="48" fill="#6600aa" opacity="0.14" filter="url(#blur8)"/>
  <ellipse cx="1400" cy="360" rx="380" ry="52" fill="#5500aa" opacity="0.16" filter="url(#blur8)"/>
  <ellipse cx="1100" cy="430" rx="460" ry="40" fill="#990055" opacity="0.12" filter="url(#blur8)"/>
  <ellipse cx="600"  cy="460" rx="340" ry="35" fill="#880060" opacity="0.11" filter="url(#blur8)"/>

  <!-- Scan-line overlay (CRT haze effect) -->
  <rect width="1920" height="540" fill="url(#scanlines)" opacity="0.045"/>

  <!-- Vignette top corners -->
  <radialGradient id="vignette" cx="50%" cy="0%" r="90%" gradientUnits="objectBoundingBox">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1920" height="540" fill="url(#vignette)"/>
</svg>
