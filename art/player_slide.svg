<svg xmlns="http://www.w3.org/2000/svg" width="48" height="32" viewBox="0 0 48 32" shape-rendering="crispEdges">
  <!--
    Sliding pose: wider than tall (48x32).
    Vex-7 is low to ground, horizontal body, one arm forward.
  -->
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-mag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- HEAD (low, tilted forward-down) -->
  <rect x="2"  y="4"  width="10" height="2"  fill="#8899aa"/>
  <rect x="2"  y="6"  width="12" height="2"  fill="#99aabb"/>
  <rect x="2"  y="8"  width="2"  height="6"  fill="#99aabb"/>
  <rect x="12" y="8"  width="2"  height="6"  fill="#99aabb"/>
  <rect x="4"  y="14" width="10" height="2"  fill="#8899aa"/>
  <!-- visor -->
  <rect x="4"  y="8"  width="8"  height="6"  fill="#001a2e"/>
  <rect x="4"  y="8"  width="8"  height="1"  fill="#00ffff" filter="url(#glow-cyan)"/>
  <rect x="4"  y="13" width="8"  height="1"  fill="#00ffff" filter="url(#glow-cyan)"/>
  <rect x="4"  y="9"  width="8"  height="1"  fill="#00eeff" opacity="0.6"/>
  <rect x="6"  y="10" width="6"  height="2"  fill="#003344" opacity="0.4"/>

  <!-- NECK -->
  <rect x="12" y="10" width="4"  height="2"  fill="#556677"/>
  <rect x="12" y="10" width="4"  height="1"  fill="#ff00cc" opacity="0.7" filter="url(#glow-mag)"/>

  <!-- TORSO (horizontal, low) -->
  <rect x="14" y="10" width="16" height="8"  fill="#1a2b3c"/>
  <rect x="14" y="11" width="16" height="1"  fill="#00ffff" opacity="0.9" filter="url(#glow-cyan)"/>
  <rect x="16" y="13" width="4"  height="3"  fill="#2a3f55"/>
  <rect x="22" y="13" width="4"  height="3"  fill="#2a3f55"/>
  <rect x="20" y="12" width="2"  height="5"  fill="#334455"/>
  <!-- shoulders -->
  <rect x="14" y="10" width="2"  height="4"  fill="#334455"/>
  <rect x="14" y="10" width="2"  height="1"  fill="#ff00cc" filter="url(#glow-mag)"/>
  <rect x="28" y="10" width="2"  height="4"  fill="#334455"/>
  <rect x="28" y="10" width="2"  height="1"  fill="#ff00cc" filter="url(#glow-mag)"/>

  <!-- FRONT ARM (forward, low — leading the slide) -->
  <rect x="30" y="12" width="4"  height="2"  fill="#334455"/>
  <rect x="34" y="14" width="4"  height="2"  fill="#445566"/>
  <rect x="38" y="14" width="4"  height="2"  fill="#7788aa"/>
  <!-- fingers/glove -->
  <rect x="42" y="14" width="4"  height="2"  fill="#8899aa"/>
  <rect x="42" y="13" width="4"  height="1"  fill="#00ffff" opacity="0.5" filter="url(#glow-cyan)"/>

  <!-- BACK ARM (trailing behind) -->
  <rect x="10" y="12" width="4"  height="2"  fill="#334455"/>
  <rect x="6"  y="14" width="4"  height="2"  fill="#445566"/>

  <!-- WAIST / belt -->
  <rect x="16" y="18" width="12" height="2"  fill="#112233"/>
  <rect x="16" y="18" width="12" height="1"  fill="#ff00cc" opacity="0.8" filter="url(#glow-mag)"/>
  <rect x="20" y="18" width="4"  height="2"  fill="#00ffff" opacity="0.7" filter="url(#glow-cyan)"/>

  <!-- LEGS (extended forward/back for low slide) -->
  <!-- Front leg (extended forward) -->
  <rect x="28" y="20" width="8"  height="4"  fill="#1a2b3c"/>
  <rect x="28" y="20" width="8"  height="1"  fill="#00ccff" opacity="0.3"/>
  <rect x="34" y="22" width="8"  height="4"  fill="#223344"/>
  <!-- Front boot -->
  <rect x="38" y="24" width="8"  height="4"  fill="#112233"/>
  <rect x="38" y="24" width="8"  height="1"  fill="#00ffff" opacity="0.6" filter="url(#glow-cyan)"/>
  <rect x="40" y="26" width="8"  height="2"  fill="#0a1a28"/>

  <!-- Back leg (bent under body) -->
  <rect x="18" y="20" width="8"  height="4"  fill="#1a2b3c"/>
  <rect x="16" y="22" width="8"  height="4"  fill="#223344"/>
  <!-- Back boot (tucked) -->
  <rect x="14" y="24" width="8"  height="4"  fill="#112233"/>
  <rect x="14" y="24" width="8"  height="1"  fill="#ff00cc" opacity="0.5" filter="url(#glow-mag)"/>
  <rect x="12" y="26" width="8"  height="2"  fill="#0a1a28"/>

  <!-- SLIDE SPARKS / ground glow -->
  <rect x="12" y="28" width="30" height="2"  fill="#00ffff" opacity="0.3" filter="url(#glow-cyan)"/>
  <rect x="16" y="30" width="22" height="1"  fill="#ff00cc" opacity="0.2" filter="url(#glow-mag)"/>
  <rect x="38" y="27" width="2"  height="2"  fill="#ffff00" opacity="0.6"/>
  <rect x="42" y="26" width="2"  height="2"  fill="#ffaa00" opacity="0.5"/>
  <rect x="44" y="28" width="2"  height="2"  fill="#ff6600" opacity="0.4"/>

  <!-- Scratches -->
  <rect x="18" y="12" width="1"  height="3"  fill="#ffffff" opacity="0.12"/>
  <rect x="24" y="14" width="1"  height="2"  fill="#ffffff" opacity="0.1"/>
</svg>
